name: Generate Feeds

on:
  schedule:
    # All feeds (tweets, podcasts, blogs): once daily at 6am UTC (14:00 Asia/Shanghai)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only
          - blogs-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Bootstrap local config dir
        run: |
          mkdir -p "$HOME/.content-signal-radar"
          if [ -f config/maple.config.json ]; then
            cp config/maple.config.json "$HOME/.content-signal-radar/config.json"
          elif [ -f config/maple.config.example.json ]; then
            cp config/maple.config.example.json "$HOME/.content-signal-radar/config.json"
          fi
          {
            echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}"
          } > "$HOME/.content-signal-radar/.env"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Generate feeds
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" != "all" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }}
          else
            cd scripts && node generate-feed.js
          fi

      - name: Prepare digest and deliver
        run: |
          cd scripts
          node prepare-digest.js > digest.txt 2>digest.err || cat digest.err
          test -s digest.txt && node deliver.js --file digest.txt || echo "digest empty or delivery skipped"

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-blogs.json state-feed.json dashboard-signals.json digest.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
